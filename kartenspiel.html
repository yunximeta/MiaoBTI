<!DOCTYPE html>
<html>
<head>
<title> kortenspile </title>

<style>

.card-container {
    display: flex;
    justify-content: center;
    gap: 20px;
}

.card {
    width: 200px;
    background: white;
    border-radius: 10px;
    padding: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="card-container">

    <div class="card">
        <img src="https://picsum.photos/200">
        <h3>卡片1</h3>
        <p>这是描述</p>
    </div>

    <div class="card">
        <img src="https://picsum.photos/201">
        <h3>卡片2</h3>
        <p>这是描述</p>
    </div>

    <div class="card">
        <img src="https://picsum.photos/202">
        <h3>卡片3</h3>
        <p>这是描述</p>
    </div>

</div>

    <input id="input" placeholder="输入">
<button onclick="add()">添加</button>

<p>数量：<span id="count">0</span></p>
<ul id="list"></ul>



    <script>
let data = [];

function add() {
    let text = document.getElementById("input").value;
    data.push(text);

    document.getElementById("input").value = "";
    render();
}

function remove(i) {
    data.splice(i, 1);
    render();
}

function render() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    for (let i = 0; i < data.length; i++) {
        list.innerHTML += `
            <li>
                ${data[i]}
                <button onclick="remove(${i})">删除</button>
            </li>
        `;
    }

    document.getElementById("count").innerText = data.length;
}
</script>
    
</body>

</html>
